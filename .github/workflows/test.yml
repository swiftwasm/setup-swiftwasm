name: "units-test"
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JAVASCRIPTKIT_WASI_BACKEND: Node
    steps:
    - uses: actions/checkout@v6
    - name: Install prerequisites
      run: |
        sudo apt-get -q update && sudo apt-get install -y binutils git gnupg2 libc6-dev libcurl4-openssl-dev libedit2 libgcc-9-dev libpython3.8 libsqlite3-0 libstdc++-9-dev libxml2-dev libz3-dev pkg-config tzdata unzip zlib1g-dev curl ubuntu-dbgsym-keyring
        ulimit -c unlimited
        cat /proc/sys/kernel/core_pattern
        sudo sysctl -w kernel.core_pattern='core.%e.%p.%t'

        . /etc/os-release
        echo "$VERSION_CODENAME"

        cat <<EOF | sudo tee /etc/apt/sources.list.d/ddebs.list
        deb http://ddebs.ubuntu.com ${VERSION_CODENAME} main restricted universe multiverse
        deb http://ddebs.ubuntu.com ${VERSION_CODENAME}-updates main restricted universe multiverse
        deb http://ddebs.ubuntu.com ${VERSION_CODENAME}-proposed main restricted universe multiverse
        EOF

        sudo apt-get update
        sudo apt-get install -y gdb libcurl4-dbgsym libc6-dbgsym
    - name: Install Swift toolchain
      uses: ./.github/actions/install-swift
      with:
        download-url: https://download.swift.org/development/ubuntu2204/swift-DEVELOPMENT-SNAPSHOT-2025-12-01-a/swift-DEVELOPMENT-SNAPSHOT-2025-12-01-a-ubuntu22.04.tar.gz
    - run: swift --version
    - uses: ./
      id: setup-swiftwasm
      with:
        target: wasm32-unknown-wasip1-threads
